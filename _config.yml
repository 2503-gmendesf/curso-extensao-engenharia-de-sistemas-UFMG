theme: jekyll-theme-chirpy

lang: pt-BR
timezone: America/Sao_Paulo

title: MeuCurso
tagline: Seu subtítulo do curso aqui — ex. Machine Learning aplicado

description: >-
  Curso de atualização em [Nome do Curso].
  Ementa completa, corpo docente, certificação e FAQ.

url: "https://seunome.github.io"
baseurl: ""

github:
  username: seunome

social:
  name: Nome do Organizador
  email: contato@email.com
  links:
    - https://github.com/seunome

# Tema padrão: dark | light
theme_mode: dark

avatar: /assets/img/logo.png

toc: true

comments:
  active: ""

paginate: 10

# -----------------------------------------------
# Analytics (opcional)
# -----------------------------------------------
analytics:
  google:
    id: ""

# -----------------------------------------------
# SEO
# -----------------------------------------------
webmaster_verifications:
  google: ""

# -----------------------------------------------
# Defaults
# -----------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true

# -----------------------------------------------
# Collections e Plugins
# -----------------------------------------------
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - rollup.config.js
  - package*.json
  - node_modules
  - Gemfile
  - Gemfile.lock
